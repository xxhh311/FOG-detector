<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧠 GaitSense: Complete Parkinson's Motor Assessment System</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4f9;
            padding: 16px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        h1 { font-size: 24px; color: #1e2f4e; margin-bottom: 4px; }
        .subtitle { font-size: 14px; color: #5a6e8a; margin-bottom: 20px; border-left: 3px solid #2c7da0; padding-left: 12px; }
        .card { background: #ffffff; border-radius: 24px; padding: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        #chart { width: 100%; height: 200px; }
        .status-panel {
            background: #eef3fc;
            border-radius: 28px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .status-label { font-size: 14px; color: #3a5a78; }
        .status-value { font-size: 32px; font-weight: 700; }
        .status-value.normal { color: #2e7d32; }
        .status-value.warning { color: #ed6c02; }
        .status-value.fog { color: #c62828; }
        .suggestion {
            background: #e1f0fa;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 24px;
            border-left: 6px solid #2c7da0;
            font-size: 15px;
            color: #0a3146;
        }
        button {
            width: 100%;
            background: white;
            border: 1.5px solid #cbdde9;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            cursor: pointer;
        }
        button.primary {
            background: #1e3a5f;
            border-color: #1e3a5f;
            color: white;
        }
        button:active { transform: scale(0.97); }
        .analysis-section {
            margin-top: 20px;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }
        .analysis-section img {
            max-width: 100%;
            border-radius: 16px;
            margin-top: 10px;
            border: 1px solid #ccc;
        }
        .report-text {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 16px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            margin-bottom: 20px;
        }
        .footer { font-size: 11px; color: #8ea0b8; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🚶 冻结步态临床监测</h1>
    <div class="subtitle">实时采集 · 云端完整分析（雷达图/趋势图/报告）</div>

    <div class="card">
        <div id="chart"></div>
    </div>

    <div style="margin-bottom: 15px;">
    <label for="patientId" style="display: block; font-size: 14px; color: #3a5a78; margin-bottom: 6px;">👤 患者 ID</label>
    <input type="text" id="patientId" placeholder="例如: PT-001" value="mobile_user" style="width: 100%; padding: 10px; border-radius: 20px; border: 1px solid #cbdde9; font-size: 16px;">
    </div>

    <div id="currentPatientDisplay" style="font-size: 12px; color: #5a6e8a; text-align: center; margin-top: 8px;"></div>

    <div class="status-panel">
        <div>
            <div class="status-label">实时风险</div>
            <div class="status-value normal" id="gaitStatus">未连接</div>
        </div>
        <div style="text-align: right;">
            <div class="status-label">最新概率</div>
            <div style="font-size: 28px; font-weight: bold;" id="riskProb">0%</div>
        </div>
    </div>

    <div class="suggestion" id="suggestionText">
        🔵 请点击下方按钮连接蓝牙设备
    </div>

    <button id="connectBtn" class="primary">🔗 连接 M5StickC Plus</button>
    <button id="disconnectBtn" disabled>⏹️ 断开连接</button>

    <div class="analysis-section">
        <h3>📋 临床分析报告（每30秒更新）</h3>
        <div id="reportText" class="report-text">等待分析...</div>
        <h3>📊 冻结步态信号图</h3>
        <img id="fogPlotImg" src="" alt="FOG分析图" style="display:none;">
        <h3>📉 跌倒风险雷达图</h3>
        <img id="radarPlotImg" src="" alt="雷达图" style="display:none;">
        <h3>📈 历史趋势图</h3>
        <img id="trendPlotImg" src="" alt="趋势图" style="display:none;">
    </div>

    <div class="footer">
        ⚠️ 临床辅助工具，不可替代专业诊断。需要 Chrome/Edge 浏览器。
    </div>
</div>

<script>
    // ==================== 配置 ====================
    const API_ENDPOINT_REALTIME = "https://lilacxu1108-fogmedicaldetector.ms.show/realtime_analysis";
//const PATIENT_ID = "mobile_user";  // 可让用户输入，此处固定
    const SAMPLE_RATE = 50;
    const WINDOW_SIZE = 100;   // 实时图表用

    // BLE 配置
    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHARACTERISTIC_UUID = "6e400003-b5a3-f393-e0a9-e50e24dcca9e";
    const DEVICE_NAME = "FOG_Sensor_M5";

    let device = null;
    let characteristic = null;
    let dataBuffer = [];      // 实时图表缓冲（最近100点）
    let historyBuffer = [];   // 历史分析缓冲（所有原始点）
    let chart = null;
    let isCollecting = false;
    let analysisInterval = null;

    function getPatientId() {
    const input = document.getElementById('patientId');
    let id = input.value.trim();
    if (id === "") {
        id = "anonymous";
        input.value = id;
    }
    return id;
}

function updatePatientDisplay() {
    const id = getPatientId();
    document.getElementById('currentPatientDisplay').innerText = `当前患者: ${id}`;
}
// 在输入框变化时调用，以及在连接蓝牙时调用
document.getElementById('patientId').addEventListener('input', updatePatientDisplay);

    // ==================== 实时图表 ====================
    function initChart() {
        const dom = document.getElementById('chart');
        chart = echarts.init(dom);
        chart.setOption({
            grid: { left: '3%', right: '3%', top: 15, bottom: 25 },
            xAxis: { type: 'category', data: [], name: '时间 (秒)' },
            yAxis: { type: 'value', name: '加速度 (g)', min: -2, max: 2 },
            series: [
                { name: '垂直 V', type: 'line', data: [], smooth: true, lineStyle: { width: 2, color: '#d14a61' }, symbol: 'none' },
                { name: '内外 ML', type: 'line', data: [], smooth: true, lineStyle: { width: 2, color: '#579f5e' }, symbol: 'none' },
                { name: '前后 AP', type: 'line', data: [], smooth: true, lineStyle: { width: 2, color: '#4e7ab3' }, symbol: 'none' }
            ],
            tooltip: { trigger: 'axis' },
            legend: { show: true, bottom: 0, left: 'center' }
        });
    }

    function updateChart() {
        if (!chart || dataBuffer.length === 0) return;
        const xAxis = dataBuffer.map((_, i) => (-(dataBuffer.length - i) / SAMPLE_RATE).toFixed(1) + 's');
        const vData = dataBuffer.map(d => d.v);
        const mlData = dataBuffer.map(d => d.ml);
        const apData = dataBuffer.map(d => d.ap);
        chart.setOption({
            xAxis: { data: xAxis },
            series: [
                { data: vData },
                { data: mlData },
                { data: apData }
            ]
        });
    }

    // ==================== 数据处理 ====================
    function processDataPoint(point) {
        if (!isCollecting) return;
        // 实时图表
        dataBuffer.push(point);
        if (dataBuffer.length > WINDOW_SIZE) dataBuffer.shift();
        updateChart();
        // 历史分析缓冲（保留所有点，最多30秒*50=1500点，足够）
        historyBuffer.push(point);
        if (historyBuffer.length > 2000) historyBuffer.shift();
    }

    // 定期发送数据到云端分析
    function startPeriodicAnalysis() {
    if (analysisInterval) clearInterval(analysisInterval);
    analysisInterval = setInterval(async () => {
        if (historyBuffer.length < 100) {
            console.log(`数据不足，当前 ${historyBuffer.length} 点，跳过分析`);
            return;
        }
        // 获取当前患者 ID
        const patientId = getPatientId();
        // 构建 URL 查询参数
        const url = new URL(API_ENDPOINT_REALTIME);
        url.searchParams.append('patient_id', patientId);
        url.searchParams.append('sample_rate', SAMPLE_RATE);
        
        const payload = {
            raw_data: {
                v: historyBuffer.map(p => p.v),
                ml: historyBuffer.map(p => p.ml),
                ap: historyBuffer.map(p => p.ap)
            }
        };
        try {
            const response = await fetch(url.toString(), {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            console.log("分析结果:", result);
            // 这里可以更新页面上的雷达图、趋势图等
            // 例如：显示 result.report, result.fog_plot 等
        } catch (error) {
            console.error("请求失败:", error);
        }
        // 清空历史缓冲区（或保留一部分重叠）
        historyBuffer = [];
    }, 30000); // 30 秒，可根据需要调整
}
    // ==================== BLE 连接 ====================
    function onDataReceived(event) {
        const decoder = new TextDecoder();
        const value = decoder.decode(event.target.value);
        try {
            const data = JSON.parse(value);
            if (typeof data.v === 'number' && typeof data.ml === 'number' && typeof data.ap === 'number') {
                processDataPoint({ v: data.v, ml: data.ml, ap: data.ap });
            } else {
                console.warn("数据格式错误", data);
            }
        } catch(e) {
            console.error("JSON解析失败", e);
        }
    }

    async function connectBluetooth() {
        if (!navigator.bluetooth) {
            alert("您的浏览器不支持 Web Bluetooth。请使用 Chrome 或 Edge。");
            return;
        }
        try {
            const selected = await navigator.bluetooth.requestDevice({
                filters: [{ name: DEVICE_NAME }],
                optionalServices: [SERVICE_UUID]
            });
            device = selected;
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const char = await service.getCharacteristic(CHARACTERISTIC_UUID);
            characteristic = char;
            await characteristic.startNotifications();
            characteristic.addEventListener('characteristicvaluechanged', onDataReceived);
            isCollecting = true;
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('disconnectBtn').disabled = false;
            document.getElementById('gaitStatus').innerText = '监测中';
            document.getElementById('suggestionText').innerHTML = '🟢 已连接，正在采集数据...';
            dataBuffer = [];
            historyBuffer = [];
            updateChart();
            startPeriodicAnalysis();
        } catch (err) {
            console.error("连接失败", err);
            alert("连接失败: " + err.message);
        }
    }

    async function disconnectBluetooth() {
        if (characteristic) {
            await characteristic.stopNotifications();
            characteristic.removeEventListener('characteristicvaluechanged', onDataReceived);
        }
        if (device && device.gatt.connected) {
            await device.gatt.disconnect();
        }
        isCollecting = false;
        if (analysisInterval) clearInterval(analysisInterval);
        device = null;
        characteristic = null;
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('disconnectBtn').disabled = true;
        document.getElementById('gaitStatus').innerText = '未连接';
        document.getElementById('riskProb').innerText = '0%';
        document.getElementById('suggestionText').innerHTML = '🔵 已断开，可重新连接';
        dataBuffer = [];
        historyBuffer = [];
        updateChart();
    }

    window.addEventListener('load', () => {
        initChart();
        document.getElementById('connectBtn').addEventListener('click', connectBluetooth);
        document.getElementById('disconnectBtn').addEventListener('click', disconnectBluetooth);
    });
</script>
</body>
</html>
